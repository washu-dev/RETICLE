name: Webapp CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'webapp/**'
      - '.github/workflows/webapp-ci-cd.yml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  S3_BUCKET: reticle-webapp-prod
  CLOUDFRONT_DISTRIBUTION_ID: EAV26T9QAOA4Q

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    outputs:
      artifact-path: ${{ steps.artifact.outputs.path }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint --if-present || true

      - name: Type check
        run: npm run typecheck --if-present || true

      - name: Build web bundle
        env:
          REACT_APP_API_BASE_URL: ${{ secrets.REACT_APP_API_BASE_URL }}
        run: npm run build:web

      - name: Upload artifact
        id: artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-build
          path: webapp/web-build/
          retention-days: 1

  deploy:
    name: Deploy to CloudFront
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-build
          path: web-build/

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync web-build/ s3://${{ env.S3_BUCKET }}/ --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
