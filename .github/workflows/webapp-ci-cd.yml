name: Webapp CI/CD

# Deploys the React Native Web (Expo for Web) static bundle to S3 + CloudFront.
#
# Triggers:
#   - Push to any branch: runs build + test + security only
#   - Push to main: runs build + test + security + deploy
#   - Pull requests targeting main or develop: runs build + test + security only
#   - Manual dispatch: allows running from GitHub Actions UI or gh CLI
on:
  push:
    branches:
      - '**'
    paths:
      - 'webapp/**'
      - '.github/workflows/webapp-ci-cd.yml'
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'webapp/**'
      - '.github/workflows/webapp-ci-cd.yml'

env:
  AWS_REGION: us-east-1
  S3_BUCKET: reticle-webapp-test
  CLOUDFRONT_DISTRIBUTION_ID: EAV26T9QAOA4Q
  # SSO-only reader role (Terraform output: sso_ci_reader_role_arn). Assumed at
  # build time to inject the public REACT_APP_SSO_* identifiers; it cannot read
  # any other RETICLE secret (DB, Secure-AI).
  RETICLE_SSO_CI_ROLE_ARN: arn:aws:iam::730335203321:role/RETICLE-sso-ci-reader

jobs:
  # ─────────────────────────────────────────────
  # Stage 1: Build
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npm run typecheck --if-present

      # Assume the SSO-only reader role to fetch the public Entra identifiers.
      - name: Configure AWS credentials (SSO config read)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.RETICLE_SSO_CI_ROLE_ARN }}
          role-session-name: reticle-sso-build
          # Trust allows sts:AssumeRole but not sts:TagSession — skip the action's
          # default session tagging so the assume isn't rejected.
          role-skip-session-tagging: true

      - name: Load SSO config from Secrets Manager
        working-directory: .
        run: |
          set -euo pipefail
          client_id=$(aws secretsmanager get-secret-value --secret-id RETICLE/sso/APP_ID    --query SecretString --output text)
          tenant_id=$(aws secretsmanager get-secret-value --secret-id RETICLE/sso/TENANT_ID --query SecretString --output text)
          echo "REACT_APP_SSO_CLIENT_ID=${client_id}" >> "$GITHUB_ENV"
          echo "REACT_APP_SSO_TENANT_ID=${tenant_id}" >> "$GITHUB_ENV"
          echo "Loaded Entra client/tenant IDs from Secrets Manager."

      - name: Build web bundle
        run: npm run build:web
        env:
          REACT_APP_API_BASE_URL: ${{ secrets.REACT_APP_API_BASE_URL }}
          # REACT_APP_SSO_CLIENT_ID / REACT_APP_SSO_TENANT_ID come from $GITHUB_ENV
          # (set in the previous step) and are inlined into the bundle by webpack.
          REACT_APP_SSO_CLIENT_ID: ${{ env.REACT_APP_SSO_CLIENT_ID }}
          REACT_APP_SSO_TENANT_ID: ${{ env.REACT_APP_SSO_TENANT_ID }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-build
          path: webapp/web-build/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Stage 2: Test
  # ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: webapp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --watchAll=false --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: webapp-coverage
          path: webapp/coverage/

  # ─────────────────────────────────────────────
  # Stage 3: Security scan
  # ─────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: webapp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit npm dependencies
        run: npm audit --audit-level=high

      - name: Run Trivy (filesystem scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: webapp/
          exit-code: '1'
          severity: CRITICAL,HIGH

  # ─────────────────────────────────────────────
  # Stage 4: Deploy — main branch only
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to S3 + CloudFront
    runs-on: ubuntu-latest
    needs: [test, security]
    # Deploy only on direct pushes to main (not PRs, not feature branches)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-build
          path: web-build/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync web-build/ s3://$S3_BUCKET --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
            --paths "/*"

