name: Webapp CI/CD

# Deploys the React Native Web (Expo for Web) static bundle to S3 + CloudFront.
#
# Triggers:
#   - Push to any branch: runs build + test + security only
#   - Push to main: runs build + test + security + deploy
#   - Pull requests targeting main or develop: runs build + test + security only
#   - Manual dispatch: allows running from GitHub Actions UI or gh CLI
on:
  push:
    branches:
      - '**'
    paths:
      - 'webapp/**'
      - '.github/workflows/webapp-ci-cd.yml'
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'webapp/**'
      - '.github/workflows/webapp-ci-cd.yml'

env:
  AWS_REGION: us-east-1
  S3_BUCKET: reticle-webapp-test
  CLOUDFRONT_DISTRIBUTION_ID: EAV26T9QAOA4Q

jobs:
  # ─────────────────────────────────────────────
  # Stage 1: Build
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Build web bundle
        run: npm run build:web
        env:
          REACT_APP_API_BASE_URL: ${{ secrets.REACT_APP_API_BASE_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-build
          path: webapp/web-build/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Stage 2: Test
  # ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: webapp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --watchAll=false --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: webapp-coverage
          path: webapp/coverage/

  # ─────────────────────────────────────────────
  # Stage 3: Security scan
  # ─────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: webapp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit npm dependencies
        run: npm audit --audit-level=high

      - name: Run Trivy (filesystem scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: webapp/
          exit-code: '1'
          severity: CRITICAL,HIGH

  # ─────────────────────────────────────────────
  # Stage 4: Deploy — main branch only
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to S3 + CloudFront
    runs-on: ubuntu-latest
    needs: [test, security]
    # Deploy only on direct pushes to main (not PRs, not feature branches)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-build
          path: web-build/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync web-build/ s3://$S3_BUCKET --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
            --paths "/*"

