name: API CI/CD

# Triggers:
#   - Push to any branch: runs build + test + security only
#   - Push to main: runs build + test + security + deploy
#   - Pull requests targeting main or develop: runs build + test + security only
#   - Manual dispatch: allows running from GitHub Actions UI or gh CLI
on:
  push:
    branches:
      - '**'
    paths:
      - 'api/**'
      - '.github/workflows/api-ci-cd.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'api/**'
      - '.github/workflows/api-ci-cd.yml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: reticle-api
  ECS_CLUSTER: reticle-cluster
  ECS_SERVICE: reticle-api-service
  ECS_TASK_DEFINITION: reticle-api-task
  CONTAINER_NAME: reticle-api

jobs:
  # ─────────────────────────────────────────────
  # Stage 1: Build & lint
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Lint (ruff)
        run: ruff check .

      - name: Typecheck (mypy)
        run: mypy . --ignore-missing-imports

      - name: Build Docker image (smoke test)
        run: docker build -t reticle-api:ci .

  # ─────────────────────────────────────────────
  # Stage 2: Test
  # ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run unit tests
        run: pytest tests/ -v --cov=. --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: api/coverage.xml

  # ─────────────────────────────────────────────
  # Stage 3: Security scan
  # ─────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit (SAST)
        run: bandit -r . -x ./tests -ll

      - name: Run Trivy (filesystem scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: api/
          exit-code: '1'
          severity: CRITICAL,HIGH

  # ─────────────────────────────────────────────
  # Stage 4: Deploy — main branch only
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [test, security]
    # Deploy only on direct pushes to main (not PRs, not feature branches)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./api
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $ECS_TASK_DEFINITION \
            --query taskDefinition \
            > task-definition.json

      - name: Render updated task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      # Rollback path:
      # ECS keeps previous task definition revisions. If this deploy step
      # fails, ECS automatically keeps the running revision stable.
      # Manual rollback:
      #   aws ecs update-service \
      #     --cluster reticle-cluster \
      #     --service reticle-api-service \
      #     --task-definition reticle-api-task:<previous-revision-number>
